# SOPS config — how Luke's secrets are encrypted.
#
# We encrypt with `age` (one keypair, no GPG keyring, no cloud KMS — right
# for a single box). The age PRIVATE key lives only on the box at
# /root/.config/sops/age/keys.txt (root-readable). The age PUBLIC key below
# is what encrypts; it's safe in the repo. Anyone can encrypt to it; only
# the box can decrypt.
#
# FIRST TIME, on the box:
#   mkdir -p ~/.config/sops/age
#   age-keygen -o ~/.config/sops/age/keys.txt      # prints the public key
#   # paste that public key (age1…) below, replacing the placeholder.
#
# Then `sops secrets.enc.env` / the encrypt+decrypt commands in SECRETS.md
# just work — SOPS reads this file to know which recipient to use.

creation_rules:
  # Matches the plaintext input (secrets.env) AND the encrypted output
  # (secrets.enc.env). SOPS picks the rule from the INPUT path at encrypt
  # time, so this must match secrets.env — matching only *.enc.env fails
  # with "no matching creation rules found".
  - path_regex: secrets.*\.env$
    # The box's age PUBLIC key (from age-keygen -y on the box). Public — safe
    # to commit. Only the matching private key (box-only) can decrypt.
    age: age1n75zynrpugascc7a4qrv3j0n4ja0jennywgzzsgmv7ftyzrvvugsppwg2s
